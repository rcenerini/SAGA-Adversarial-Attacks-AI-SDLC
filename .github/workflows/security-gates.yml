name: Security Gates

on:
  workflow_run:
    workflows: ["Red Team (Nightly - Full)"]
    types: [completed]

jobs:
  evaluate_redteam_results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports
      - name: Check Gates logic
        run: |
          python workflows/evaluate_results.py \
            --inputs reports/ \
            --fail-on-critical true \
            --fail-on-high true
